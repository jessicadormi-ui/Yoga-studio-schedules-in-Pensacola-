<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gulf Coast Yoga Week</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650&family=Public+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --sea:#F2F5F3; --ink:#22313A; --mute:#5C6B73; --line:#DCE4E1;
    --gold:#F2A65A; --glass:#6FA8A0; --card:#FFFFFF;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--sea);color:var(--ink);
       font:15px/1.45 "Public Sans",system-ui,sans-serif}
  a{color:inherit}
  .wrap{max-width:1240px;margin:0 auto;padding:0 20px 64px}

  /* header — the horizon */
  header{padding:34px 0 18px}
  h1{font-family:Fraunces,serif;font-weight:650;font-size:clamp(26px,4vw,40px);
     margin:0;letter-spacing:-.01em}
  h1 em{font-style:normal;color:var(--glass)}
  .horizon{height:3px;border-radius:2px;margin:14px 0 10px;
           background:linear-gradient(90deg,var(--gold),var(--glass) 60%,transparent)}
  .meta{color:var(--mute);font-size:13px;display:flex;gap:14px;flex-wrap:wrap}
  .meta code{font-family:"Spline Sans Mono",monospace;font-size:12px}

  /* class-type filter row */
  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:14px 0 2px}
  .filters .flabel{font-size:12px;color:var(--mute);text-transform:uppercase;
                   letter-spacing:.06em;font-weight:600;margin-right:2px}

  /* class-type pills (used by the discipline filter) */
  .pill{border:1.5px solid var(--dot,var(--mute));border-radius:999px;background:var(--card);
        padding:6px 14px 6px 10px;font-size:13px;font-weight:600;cursor:pointer;
        display:inline-flex;align-items:center;gap:7px;color:var(--ink)}
  .pill .dot{width:10px;height:10px;border-radius:50%;background:var(--dot)}
  .pill.off{opacity:.35;border-color:var(--line)}
  .pill:focus-visible{outline:3px solid var(--glass);outline-offset:2px}

  /* studio dropdown */
  .studios{position:relative;margin:18px 0 6px}
  .studio-toggle{border:1.5px solid var(--line);border-radius:10px;background:var(--card);
        padding:8px 14px;font:inherit;font-size:14px;font-weight:600;color:var(--ink);
        cursor:pointer;display:inline-flex;align-items:center;gap:10px}
  .studio-toggle .caret{color:var(--mute);font-size:11px}
  .studio-toggle:focus-visible{outline:3px solid var(--glass);outline-offset:2px}
  .studio-panel{position:absolute;z-index:20;margin-top:6px;background:var(--card);
        border:1px solid var(--line);border-radius:12px;padding:10px;min-width:262px;
        max-width:calc(100vw - 40px);max-height:60vh;overflow:auto;
        box-shadow:0 12px 34px rgba(34,49,58,.16)}
  .studio-actions{display:flex;gap:8px;padding:0 2px 8px;margin-bottom:6px;
        border-bottom:1px solid var(--line)}
  .studio-actions button{flex:1;border:1px solid var(--line);border-radius:8px;
        background:var(--sea);padding:6px 8px;font:inherit;font-size:12px;font-weight:600;
        color:var(--ink);cursor:pointer}
  .studio-actions button:hover{border-color:var(--glass)}
  .studio-option{display:flex;align-items:center;gap:9px;padding:6px;border-radius:8px;
        cursor:pointer;font-size:14px;line-height:1.2}
  .studio-option:hover{background:var(--sea)}
  .studio-option input{width:16px;height:16px;accent-color:var(--glass);cursor:pointer;margin:0;flex:none}
  .studio-option .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .studio-option.disabled{opacity:.4;cursor:default}
  .studio-option.disabled:hover{background:transparent}
  .studio-option.disabled input{cursor:default}

  /* week grid */
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:16px}
  .day{background:var(--card);border:1px solid var(--line);border-radius:12px;
       padding:10px 10px 12px;min-height:120px}
  .day.today{border-color:var(--gold);box-shadow:0 0 0 2px rgba(242,166,90,.25)}
  .dayhead{display:flex;justify-content:space-between;align-items:baseline;
           border-bottom:1px solid var(--line);padding-bottom:7px;margin-bottom:9px}
  .dayname{font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.06em}
  .daynum{font-family:"Spline Sans Mono",monospace;color:var(--mute);font-size:12px}
  .today .dayname{color:#B9741F}

  .chip{border-left:3px solid var(--dot);background:color-mix(in srgb,var(--dot) 7%,white);
        border-radius:0 8px 8px 0;padding:6px 8px;margin-bottom:7px;display:block;
        text-decoration:none;transition:transform .08s ease}
  .chip:hover{transform:translateX(2px)}
  .chip .t{font-family:"Spline Sans Mono",monospace;font-size:12px;font-weight:500;
           color:var(--mute)}
  .chip .n{font-weight:600;font-size:13px;line-height:1.25;margin:1px 0}
  .chip .i{font-size:12px;color:var(--mute)}
  .empty{color:var(--mute);font-size:12px;font-style:italic}

  /* link-only strip */
  .also{margin-top:34px}
  .also h2{font-family:Fraunces,serif;font-weight:500;font-size:19px;margin:0 0 10px}
  .cards{display:flex;gap:12px;flex-wrap:wrap}
  .card{background:var(--card);border:1px dashed var(--line);border-radius:12px;
        padding:12px 16px;text-decoration:none;max-width:340px}
  .card .n{font-weight:600}
  .card .p{font-size:12px;color:var(--mute);margin-top:2px}
  .tag{display:inline-block;font-size:11px;font-weight:600;vertical-align:middle;
       border:1px solid var(--dot);color:var(--dot);border-radius:999px;
       padding:1px 8px;margin-left:6px}

  .error{background:#FBEFE9;border:1px solid #E8C9B8;border-radius:10px;
         padding:10px 14px;font-size:13px;margin-top:14px}

  @media (max-width:900px){
    .grid{grid-template-columns:1fr;gap:12px}
    .day{min-height:0}
    .day:not(.has-classes){display:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Gulf Coast <em>Yoga Week</em></h1>
    <div class="horizon" aria-hidden="true"></div>
    <div class="meta">
      <span id="range">Loading the week…</span>
      <span id="stamp"></span>
      <span>All times Central</span>
    </div>
    <div class="filters" id="discfilter" role="group" aria-label="Filter by class type"></div>
    <div class="studios" id="studioFilter"></div>
  </header>

  <main>
    <div class="grid" id="grid"></div>
    <div id="errors"></div>
    <section class="also" id="also" hidden>
      <h2>Also nearby — schedule on their site</h2>
      <div class="cards" id="cards"></div>
    </section>
  </main>
</div>

<script>
const grid = document.getElementById('grid');
const state = { hidden: new Set(), hiddenDisc: new Set() };
const DISC_COLOR = { yoga:'#6FA8A0', pilates:'#F2A65A', other:'#8A94A6' };
const DISC_ORDER = ['yoga','pilates','other'];
const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

// Studio dropdown: built once, then updated in place so it stays open while you
// check several boxes. A studio is greyed out when none of its classes fall in
// the currently-selected class types.
let studioUI = null;
function ensureStudioDropdown(data){
  if (studioUI) return;
  const wrap = document.getElementById('studioFilter');
  const toggle = document.createElement('button');
  toggle.type = 'button';
  toggle.className = 'studio-toggle';
  toggle.setAttribute('aria-haspopup', 'true');
  toggle.setAttribute('aria-expanded', 'false');
  toggle.innerHTML = '<span class="stxt"></span><span class="caret">▾</span>';

  const panel = document.createElement('div');
  panel.className = 'studio-panel';
  panel.hidden = true;

  const actions = document.createElement('div');
  actions.className = 'studio-actions';
  const allBtn = document.createElement('button');
  allBtn.type = 'button'; allBtn.textContent = 'Select all';
  allBtn.onclick = () => { state.hidden.clear(); render(data); };
  const noneBtn = document.createElement('button');
  noneBtn.type = 'button'; noneBtn.textContent = 'Select none';
  noneBtn.onclick = () => { data.studios.forEach(s => state.hidden.add(s.name)); render(data); };
  actions.append(allBtn, noneBtn);

  const list = document.createElement('div');
  list.className = 'studio-list';
  data.studios.forEach(s => {
    const label = document.createElement('label');
    label.className = 'studio-option';
    label.dataset.studio = s.name;
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.onchange = () => {
      cb.checked ? state.hidden.delete(s.name) : state.hidden.add(s.name);
      render(data);
    };
    const dot = document.createElement('span');
    dot.className = 'dot'; dot.style.background = s.color;
    const nm = document.createElement('span');
    nm.className = 'sname'; nm.textContent = s.name;
    label.append(cb, dot, nm);
    list.appendChild(label);
  });

  panel.append(actions, list);
  toggle.onclick = () => {
    const open = panel.hidden;
    panel.hidden = !open;
    toggle.setAttribute('aria-expanded', String(open));
  };
  document.addEventListener('click', e => {
    if (!wrap.contains(e.target)) { panel.hidden = true; toggle.setAttribute('aria-expanded','false'); }
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { panel.hidden = true; toggle.setAttribute('aria-expanded','false'); }
  });
  wrap.append(toggle, panel);
  studioUI = { toggle, panel, list };
}

function updateStudioDropdown(data){
  ensureStudioDropdown(data);
  const total = data.studios.length;
  const selected = data.studios.filter(s => !state.hidden.has(s.name)).length;
  studioUI.toggle.querySelector('.stxt').textContent =
    selected === total ? `All studios (${total})`
    : selected === 0 ? 'No studios selected'
    : `Studios (${selected} of ${total})`;
  studioUI.list.querySelectorAll('.studio-option').forEach(label => {
    const s = data.studios.find(x => x.name === label.dataset.studio);
    const cb = label.querySelector('input');
    cb.checked = !state.hidden.has(s.name);
    const applies = s.classes.some(c => !state.hiddenDisc.has(c.discipline));
    label.classList.toggle('disabled', !applies);
    cb.disabled = !applies;
    label.title = applies ? '' : 'No classes in the selected class type(s) this week';
  });
}

function fmtTime(hm){
  const [h,m] = hm.split(':').map(Number);
  const ap = h >= 12 ? 'pm' : 'am';
  return `${((h+11)%12)+1}:${String(m).padStart(2,'0')}${ap}`;
}
function dayLabel(iso){
  const d = new Date(iso + 'T12:00:00');
  return { name: d.toLocaleDateString('en-US',{weekday:'short'}),
           num:  d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'}) };
}

function render(data){
  const days = [];
  for (let d = new Date(data.week_start+'T12:00:00');
       days.length < 7; d.setDate(d.getDate()+1)) {
    days.push(d.toISOString().slice(0,10));
  }
  const todayISO = new Date().toLocaleDateString('sv-SE',{timeZone:data.timezone});

  document.getElementById('range').textContent =
    `${dayLabel(days[0]).name} ${dayLabel(days[0]).num} – ${dayLabel(days[6]).name} ${dayLabel(days[6]).num}`;
  document.getElementById('stamp').textContent =
    'Updated ' + new Date(data.generated_at).toLocaleString('en-US',
      {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});

  // class-type (discipline) filter — only shown when >1 discipline is present
  const dwrap = document.getElementById('discfilter');
  const present = new Set(data.studios.flatMap(s=>s.classes.map(c=>c.discipline)));
  const discs = DISC_ORDER.filter(d=>present.has(d));
  dwrap.innerHTML = '';
  if (discs.length > 1){
    const lab = document.createElement('span');
    lab.className = 'flabel'; lab.textContent = 'Class type';
    dwrap.appendChild(lab);
    discs.forEach(d=>{
      const b = document.createElement('button');
      b.className = 'pill' + (state.hiddenDisc.has(d) ? ' off' : '');
      b.style.setProperty('--dot', DISC_COLOR[d] || DISC_COLOR.other);
      b.setAttribute('aria-pressed', !state.hiddenDisc.has(d));
      b.innerHTML = `<span class="dot"></span>${cap(d)}`;
      b.onclick = ()=>{ state.hiddenDisc.has(d) ? state.hiddenDisc.delete(d)
                                                : state.hiddenDisc.add(d);
                        render(data); };
      dwrap.appendChild(b);
    });
  }

  // studio dropdown (checkboxes; greys out studios with no applicable classes)
  updateStudioDropdown(data);

  // week columns
  grid.innerHTML = '';
  days.forEach(iso=>{
    const col = document.createElement('div');
    col.className = 'day' + (iso === todayISO ? ' today' : '');
    const lbl = dayLabel(iso);
    col.innerHTML = `<div class="dayhead"><span class="dayname">${lbl.name}</span>
                     <span class="daynum">${lbl.num}</span></div>`;
    const items = [];
    data.studios.forEach(s=>{
      if (state.hidden.has(s.name)) return;
      s.classes.filter(c=>c.date===iso && !state.hiddenDisc.has(c.discipline))
               .forEach(c=>items.push({...c, studio:s}));
    });
    items.sort((a,b)=>a.time.localeCompare(b.time));
    if (!items.length){
      col.insertAdjacentHTML('beforeend','<div class="empty">No classes</div>');
    } else {
      col.classList.add('has-classes');
      items.forEach(c=>{
        const a = document.createElement('a');
        a.className = 'chip'; a.href = c.studio.booking_url;
        a.target = '_blank'; a.rel = 'noopener';
        a.style.setProperty('--dot', c.studio.color);
        a.title = `${c.studio.name} — book on ${c.studio.platform}`;
        a.innerHTML = `<span class="t">${fmtTime(c.time)}</span>
                       <div class="n">${c.name}</div>
                       <div class="i">${c.instructor || c.studio.name}</div>`;
        col.appendChild(a);
      });
    }
    grid.appendChild(col);
  });

  // fetch errors, if any
  const errs = data.studios.filter(s=>s.error);
  document.getElementById('errors').innerHTML = errs.map(s=>
    `<div class="error"><strong>${s.name}</strong> didn’t load this run —
     <a href="${s.booking_url}" target="_blank" rel="noopener">check their schedule directly</a>.</div>`
  ).join('');

  // link-only studios (hidden if their discipline is filtered out)
  const linkOnly = (data.link_only || []).filter(s=>!state.hiddenDisc.has(s.discipline));
  document.getElementById('also').hidden = !linkOnly.length;
  document.getElementById('cards').innerHTML = linkOnly.map(s=>{
    const tag = s.discipline
      ? ` <span class="tag" style="--dot:${DISC_COLOR[s.discipline]||DISC_COLOR.other}">${cap(s.discipline)}</span>`
      : '';
    return `<a class="card" href="${s.booking_url}" target="_blank" rel="noopener">
        <div class="n">${s.name}${tag}</div>
        <div class="p">${s.platform} · ${s.area}</div>
        <div class="p">${s.note}</div>
      </a>`;
  }).join('');
}

fetch('schedule.json')
  .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(()=>{
    grid.innerHTML = `<div class="error" style="grid-column:1/-1">
      Couldn’t load <code>schedule.json</code>. Run
      <code>python3 fetch_schedules.py</code> in this folder, then serve the site
      with <code>python3 -m http.server</code> (opening index.html directly as a
      file blocks the data fetch).</div>`;
  });
</script>
</body>
</html>
